name: dependency-audit

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install --upgrade pip-audit
      - name: Audit requirements.txt
        if: hashFiles('requirements.txt') != ''
        run: pip-audit -r requirements.txt --strict
      # Only audit pyproject.toml when requirements.txt is absent. A bare
      # `pip-audit --strict` scans the entire runner env (including the
      # system pip itself), which surfaces CVEs in pip that aren't
      # actionable for this project. Pointing it at the project directory
      # (`pip-audit . --strict`) restricts the scan to declared deps.
      - name: Audit pyproject.toml
        if: hashFiles('requirements.txt') == '' && hashFiles('pyproject.toml') != ''
        run: pip-audit . --strict
